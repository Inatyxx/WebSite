<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutarin Antoine — Game Programmer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">Boutarin<span class="dot"> Antoine</span></a>
    <button id="burger" class="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="nav" class="site-nav">
      <ul>
        <li><a href="index.html"    data-i18n="nav.home"></a></li>
        <li><a href="projects.html" data-i18n="nav.projects"></a></li>
        <li><a href="#formation"    data-i18n="nav.formation"></a></li>
        <li><a href="#experience"   data-i18n="nav.experience"></a></li>
        <li><a class="primary-btn" href="contact.html" data-i18n="nav.contact"></a></li>
      </ul>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="fr" title="Français"><img src="Img/frenchflag.png" alt="FR" /></button>
        <button class="lang-btn" data-lang="en" title="English"><img src="Img/ukflag.png" alt="EN" /></button>
      </div>
    </nav>
  </div>
</header>

<main class="hero">
  <div class="container hero-inner">
    <div class="hero-content">
      <div class="profile-block">
        <img class="hero-avatar" src="Img/Moi.png" alt="Antoine Boutarin" />
        <div class="hero-title">
          <h1>Boutarin Antoine</h1>
          <p class="subtitle" data-i18n="hero.subtitle"></p>
        </div>
      </div>
      <p class="hero-bio" data-i18n="hero.bio"></p>
      <div class="hero-cta">
        <a class="primary-btn" href="projects.html" data-i18n="hero.cta.projects"></a>
        <a class="btn-outline"  href="contact.html" data-i18n="hero.cta.contact"></a>
      </div>
    </div>

    <div class="hero-panels">
      <div id="formation" class="panel">
        <p class="panel-label" data-i18n="panel.formation.label"></p>
        <h3 data-i18n="panel.formation.title"></h3>
        <p data-i18n="panel.formation.1" data-i18n-html></p>
        <br />
        <p data-i18n="panel.formation.2" data-i18n-html></p>
      </div>
      <div id="experience" class="panel">
        <p class="panel-label" data-i18n="panel.experience.label"></p>
        <h3 data-i18n="panel.experience.title"></h3>
        <p data-i18n="panel.experience.1" data-i18n-html></p>
        <br />
        <p data-i18n="panel.experience.2" data-i18n-html></p>
        <br />
        <p data-i18n="panel.experience.3" data-i18n-html></p>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <span data-i18n="footer.text"></span> <a href="contact.html" data-i18n="footer.contact"></a>
</footer>

<script src="i18n.js"></script>
<script>
  const burger = document.getElementById('burger');
  const nav    = document.getElementById('nav');
  burger.addEventListener('click', () => {
    burger.classList.toggle('open');
    nav.classList.toggle('open');
  });
</script>
</body>
</html>
