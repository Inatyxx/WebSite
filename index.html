<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutarin Antoine — Game Programmer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">Boutarin<span class="dot"> Antoine</span></a>
    <button id="burger" class="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="nav" class="site-nav">
      <ul>
        <li><a href="index.html"    data-i18n="nav.home"></a></li>
        <li><a href="projects.html" data-i18n="nav.projects"></a></li>
        <li><a href="#about"        data-i18n="nav.about"></a></li>
        <li><a href="#formation"    data-i18n="nav.formation"></a></li>
        <li><a href="#experience"   data-i18n="nav.experience"></a></li>
        <li><a class="primary-btn" href="contact.html" data-i18n="nav.contact"></a></li>
      </ul>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="fr" title="Français"><img src="Img/frenchflag.png" alt="FR" /></button>
        <button class="lang-btn" data-lang="en" title="English"><img src="Img/ukflag.png" alt="EN" /></button>
      </div>
    </nav>
  </div>
</header>

<!-- HERO -->
<main>
  <div class="hero">
    <div class="container hero-inner">
      <div class="hero-content">
        <div class="profile-block">
          <img class="hero-avatar" src="Img/Moi.png" alt="Antoine Boutarin" />
          <div class="hero-title">
            <h1>Boutarin Antoine</h1>
            <p class="subtitle" data-i18n="hero.subtitle"></p>
          </div>
        </div>
        <p class="hero-bio" data-i18n="hero.bio"></p>
        <div class="hero-cta">
          <a class="primary-btn" href="projects.html" data-i18n="hero.cta.projects"></a>
          <a class="btn-outline"  href="contact.html" data-i18n="hero.cta.contact"></a>
        </div>
      </div>

      <div class="hero-panels">
        <div id="formation" class="panel">
          <p class="panel-label" data-i18n="panel.formation.label"></p>
          <h3 data-i18n="panel.formation.title"></h3>
          <p data-i18n="panel.formation.1" data-i18n-html></p>
          <br />
          <p data-i18n="panel.formation.2" data-i18n-html></p>
        </div>
        <div id="experience" class="panel">
          <p class="panel-label" data-i18n="panel.experience.label"></p>
          <h3 data-i18n="panel.experience.title"></h3>
          <p data-i18n="panel.experience.1" data-i18n-html></p>
          <br />
          <p data-i18n="panel.experience.2" data-i18n-html></p>
          <br />
          <p data-i18n="panel.experience.3" data-i18n-html></p>
        </div>
      </div>
    </div>
  </div>

  <!-- À PROPOS -->
  <section id="about" class="about-section container">
    <div class="section-header">
      <p class="section-tag" data-i18n="about.tag"></p>
      <h2 data-i18n="about.title"></h2>
    </div>
    <div class="about-grid">
      <div class="about-text">
        <p data-i18n="about.p1"></p>
        <p data-i18n="about.p2"></p>
      </div>
      <div class="about-highlights">
        <div class="highlight-card">
          <span class="highlight-icon">🎮</span>
          <div>
            <strong data-i18n="about.h1.title"></strong>
            <p data-i18n="about.h1.desc"></p>
          </div>
        </div>
        <div class="highlight-card">
          <span class="highlight-icon">🛠️</span>
          <div>
            <strong data-i18n="about.h2.title"></strong>
            <p data-i18n="about.h2.desc"></p>
          </div>
        </div>
        <div class="highlight-card">
          <span class="highlight-icon">🔍</span>
          <div>
            <strong data-i18n="about.h3.title"></strong>
            <p data-i18n="about.h3.desc"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- SKILLS -->
  <section id="skills" class="skills-section container">
    <div class="section-header">
      <p class="section-tag" data-i18n="skills.tag"></p>
      <h2 data-i18n="skills.title"></h2>
    </div>
    <div class="skills-grid">

      <div class="skill-group">
        <p class="skill-group-label" data-i18n="skills.group.languages"></p>
        <div class="skill-pills">
          <span class="skill-pill pill-hot">C#</span>
          <span class="skill-pill pill-hot">Python</span>
          <span class="skill-pill pill-mid">C++</span>
          <span class="skill-pill pill-mid">C</span>
        </div>
      </div>

      <div class="skill-group">
        <p class="skill-group-label" data-i18n="skills.group.engines"></p>
        <div class="skill-pills">
          <span class="skill-pill pill-hot">Unity</span>
          <span class="skill-pill pill-mid">Unreal Engine 5</span>
        </div>
      </div>

      <div class="skill-group">
        <p class="skill-group-label" data-i18n="skills.group.tools"></p>
        <div class="skill-pills">
          <span class="skill-pill pill-hot">Git / GitHub</span>
          <span class="skill-pill pill-hot">Visual Studio <Code></Code></span>
          <span class="skill-pill pill-mid">Visual Studio</span> 
        </div>
      </div>

      <div class="skill-group">
        <p class="skill-group-label" data-i18n="skills.group.concepts"></p>
        <div class="skill-pills">
          <span class="skill-pill pill-hot">Gameplay Programming</span>
          <span class="skill-pill pill-hot">POO</span>
          <span class="skill-pill pill-mid">Génération procédurale</span>
          <span class="skill-pill pill-mid">Blueprints UE5</span>
        </div>
      </div>

    </div>
    <div class="skill-legend">
      <span><span class="pill-dot pill-hot"></span> <span data-i18n="skills.legend.hot"></span></span>
      <span><span class="pill-dot pill-mid"></span> <span data-i18n="skills.legend.mid"></span></span>
    </div>
  </section>

</main>

<footer class="site-footer">
  <span data-i18n="footer.text"></span> <a href="contact.html" data-i18n="footer.contact"></a>
</footer>

<script src="i18n.js"></script>
<script>
  const burger = document.getElementById('burger');
  const nav    = document.getElementById('nav');
  burger.addEventListener('click', () => {
    burger.classList.toggle('open');
    nav.classList.toggle('open');
  });
</script>
</body>
</html>
