<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Boutarin Antoine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">Boutarin<span class="dot"> Antoine</span></a>
    <button id="burger" class="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav id="nav" class="site-nav">
      <ul>
        <li><a href="index.html"    data-i18n="nav.home"></a></li>
        <li><a href="projects.html" data-i18n="nav.projects"></a></li>
        <li><a href="index.html#formation"  data-i18n="nav.formation"></a></li>
        <li><a href="index.html#experience" data-i18n="nav.experience"></a></li>
        <li><a class="primary-btn" href="contact.html" data-i18n="nav.contact"></a></li>
      </ul>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="fr" title="Français"><img src="Img/frenchflag.png" alt="FR" /></button>
        <button class="lang-btn" data-lang="en" title="English"><img src="Img/ukflag.png" alt="EN" /></button>
      </div>
    </nav>
  </div>
</header>

<main class="contact-wrapper">
  <div class="contact-header">
    <p class="section-tag" data-i18n="contact.tag"></p>
    <h1 data-i18n="contact.title"></h1>
    <p data-i18n="contact.sub"></p>
  </div>

  <div class="contact-grid">

    <div class="contact-card">
      <h2 data-i18n="contact.info.title"></h2>

      <div class="contact-row">
        <span class="label" data-i18n="contact.info.address"></span>
        <span class="value">54 rue Germain</span>
      </div>
      <div class="contact-row">
        <span class="label" data-i18n="contact.info.phone"></span>
        <span class="value"><a href="tel:+33769006334">07 69 00 63 34</a></span>
      </div>
      <div class="contact-row">
        <span class="label" data-i18n="contact.info.email"></span>
        <span class="value"><a href="mailto:aboutarin@gaming.tech">aboutarin@gaming.tech</a></span>
      </div>
      <div class="contact-row">
        <span class="label" data-i18n="contact.info.linkedin"></span>
        <span class="value">
          <a href="https://www.linkedin.com/in/antoine-boutarin-3aba61298/" target="_blank" rel="noopener">Boutarin Antoine ↗</a>
        </span>
      </div>
    </div>

    <div class="contact-card">
      <h2 data-i18n="contact.cv.title"></h2>
      <p style="color: var(--muted); font-size: 0.88rem; margin-bottom: 1.2rem;" data-i18n="contact.cv.desc"></p>
      <a class="btn" href="Img/CV Antoine Boutarin.pdf" download data-i18n="contact.cv.btn"></a>
    </div>

  </div>
</main>

<footer class="site-footer">
  <span data-i18n="footer.text"></span> <a href="contact.html" data-i18n="footer.contact"></a>
</footer>

<script src="i18n.js"></script>
<script>
  const burger = document.getElementById('burger');
  const nav    = document.getElementById('nav');
  burger.addEventListener('click', () => {
    burger.classList.toggle('open');
    nav.classList.toggle('open');
  });
</script>
</body>
</html>
